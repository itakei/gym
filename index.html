<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Gym Logger</title>
<style>
:root {
  --bg: #121212;
  --surface: #1e1e1e;
  --surface2: #2a2a2a;
  --surface3: #333;
  --text: #e0e0e0;
  --text-dim: #888;
  --accent: #4fc3f7;
  --accent-dim: #2a6f8f;
  --green: #66bb6a;
  --green-dim: #2e5e30;
  --red: #ef5350;
  --orange: #ffa726;
  --yellow: #fff176;
  --radius: 12px;
  --card-gap: 12px;
  --btn-min: 40px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overscroll-behavior-y: contain;
  -webkit-overflow-scrolling: touch;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
button {
  font-family: inherit;
  border: none;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
input {
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
}

/* Sticky rest timer */
#rest-timer-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  background: var(--accent-dim);
  color: #fff;
  text-align: center;
  padding: 14px 16px;
  font-size: 1.4rem;
  font-weight: 700;
  display: none;
  cursor: pointer;
  user-select: none;
  border-bottom: 2px solid var(--accent);
}
#rest-timer-bar.urgent { background: var(--red); border-bottom-color: var(--red); }
#rest-timer-bar .label { font-size: 0.8rem; font-weight: 400; opacity: 0.8; display: block; }

/* Header */
.header {
  padding: 16px 16px 8px;
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
}
.header.timer-active { top: 58px; }
.header h1 { font-size: 1.3rem; font-weight: 700; }
.header .meta { font-size: 0.85rem; color: var(--text-dim); margin-top: 2px; display: flex; gap: 12px; align-items: center; }
.header .meta .session-time { color: var(--accent); font-weight: 600; }

/* Energy selector */
.est-time-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 12px;
  font-size: 0.85rem;
  color: var(--text-dim);
}
.est-time-bar .est-label { font-weight: 400; }
.est-time-bar .est-value { font-weight: 700; color: var(--accent); }

/* Notes */
.notes-section { padding: 0 16px 8px; }
.notes-toggle {
  background: none;
  color: var(--accent);
  font-size: 0.85rem;
  padding: 6px 0;
}
.notes-area {
  display: none;
  width: 100%;
  min-height: 60px;
  background: var(--surface);
  border: 1px solid var(--surface3);
  border-radius: var(--radius);
  color: var(--text);
  padding: 10px;
  font-size: 0.95rem;
  resize: vertical;
  margin-top: 4px;
}
.notes-area.show { display: block; }

/* Exercise cards */
.exercises { padding: 0 12px; display: flex; flex-direction: column; gap: var(--card-gap); }
.exercise-card {
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
}
.exercise-card .card-header {
  padding: 14px 16px 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.exercise-card .card-header h2 { font-size: 1.05rem; font-weight: 700; flex: 1; }
.remove-exercise-btn {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: transparent;
  color: var(--text-dim);
  font-size: 1.1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-left: 8px;
  opacity: 0.5;
}
.remove-exercise-btn:active { opacity: 1; color: var(--red); }
.exercise-card .card-header .badge {
  font-size: 0.7rem;
  background: var(--surface3);
  padding: 3px 8px;
  border-radius: 20px;
  color: var(--text-dim);
}

/* Set rows */
.set-row {
  display: flex;
  align-items: center;
  gap: 3px;
  padding: 6px 8px;
  border-top: 1px solid var(--surface2);
  transition: background 0.2s;
}
.set-row.completed {
  background: var(--green-dim);
}
.set-row .set-label {
  width: 22px;
  font-size: 0.7rem;
  color: var(--text-dim);
  text-align: center;
  flex-shrink: 0;
}
.set-row.completed .set-label { color: var(--green); }
.set-row .set-label.warmup { color: var(--orange); font-size: 0.65rem; }

/* Input group (stepper) */
.input-group {
  display: flex;
  align-items: center;
  gap: 0;
  flex: 1;
  min-width: 0;
}
.input-group .unit-label {
  display: none;
}
.stepper-btn {
  width: 36px;
  height: 36px;
  background: var(--surface3);
  color: var(--text);
  font-size: 1.1rem;
  font-weight: 700;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  user-select: none;
}
.stepper-btn:active { background: var(--accent-dim); }
.stepper-input {
  width: 44px;
  text-align: center;
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 1rem;
  font-weight: 700;
  outline: none;
  -moz-appearance: textfield;
}
.stepper-input::-webkit-inner-spin-button,
.stepper-input::-webkit-outer-spin-button { -webkit-appearance: none; }

/* Time input for cycling */
.time-input-group {
  display: flex;
  align-items: center;
  gap: 4px;
  flex: 1;
}
.time-input {
  width: 64px;
  text-align: center;
  background: var(--surface2);
  border: 1px solid var(--surface3);
  border-radius: 8px;
  color: var(--text);
  font-size: 1.1rem;
  font-weight: 700;
  padding: 10px 4px;
  outline: none;
}
.time-input:focus { border-color: var(--accent); }
.time-sep { font-size: 1.1rem; font-weight: 700; }

/* Seconds input for time exercises */
.seconds-input-group {
  display: flex;
  align-items: center;
  gap: 0;
  flex: 1;
  min-width: 0;
}
.seconds-stepper-input {
  width: 52px;
  text-align: center;
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 1rem;
  font-weight: 700;
  outline: none;
  -moz-appearance: textfield;
}
.seconds-stepper-input::-webkit-inner-spin-button,
.seconds-stepper-input::-webkit-outer-spin-button { -webkit-appearance: none; }

/* Done button */
.done-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--surface3);
  color: var(--text-dim);
  font-size: 1.1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
  margin-left: 2px;
}
.done-btn.checked {
  background: var(--green);
  color: #fff;
}
.done-btn:active { transform: scale(0.92); }

/* Remove set button */
.remove-set-btn {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: transparent;
  color: var(--red);
  font-size: 0.8rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  opacity: 0.6;
  transition: opacity 0.15s;
  margin-left: 1px;
}
.remove-set-btn:active { opacity: 1; background: rgba(239,83,80,0.15); }

/* Add set button inside card */
.add-set-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 10px;
  background: transparent;
  color: var(--accent);
  font-size: 0.85rem;
  font-weight: 600;
  border-top: 1px solid var(--surface2);
}
.add-set-btn:active { background: var(--surface2); }

/* Add exercise - big button */
.add-exercise-section { padding: 16px 12px; padding-bottom: 120px; }
.add-exercise-btn {
  width: 100%;
  min-height: 56px;
  padding: 16px;
  background: var(--accent);
  color: #000;
  font-size: 1.15rem;
  font-weight: 700;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border: none;
}
.add-exercise-btn:active { opacity: 0.85; }
.add-exercise-btn .plus-icon {
  font-size: 1.6rem;
  font-weight: 700;
  line-height: 1;
}

/* Bottom bar */
.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 12px 16px;
  padding-bottom: calc(12px + env(safe-area-inset-bottom, 0));
  background: linear-gradient(transparent, var(--bg) 20%);
  display: flex;
  gap: 10px;
  z-index: 100;
}
.finish-btn {
  flex: 1;
  padding: 16px;
  background: var(--green);
  color: #000;
  font-size: 1.05rem;
  font-weight: 700;
  border-radius: var(--radius);
}
.finish-btn:active { opacity: 0.85; }
.finish-btn.pause-mode { background: var(--orange); }
.defer-btn {
  background: transparent; color: var(--text-dim); border: 1px solid var(--surface3);
  padding: 4px 10px; font-size: 0.7rem; border-radius: 6px; margin-left: 4px; cursor: pointer;
}
.defer-btn:hover { color: var(--orange); border-color: var(--orange); }
.exercise-card.deferred { opacity: 0.6; }
.exercise-card.deferred .deferred-msg {
  padding: 14px; text-align: center; font-size: 0.85rem; color: var(--text-dim);
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.undefer-btn {
  background: transparent; color: var(--green); border: 1px solid var(--green);
  padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 0.75rem;
}
.home-banner {
  background: var(--surface2); border: 1px solid var(--orange); border-radius: var(--radius);
  padding: 14px; margin-bottom: 12px; color: var(--text);
}
.home-banner .hb-title { font-weight: 700; color: var(--orange); margin-bottom: 6px; }
.home-banner .hb-list { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 10px; }
.home-banner button {
  background: var(--green); color: #000; border: none; padding: 10px 16px;
  border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 0.9rem;
}
.history-btn {
  padding: 16px 20px;
  background: var(--surface2);
  color: var(--text-dim);
  font-size: 0.85rem;
  font-weight: 600;
  border-radius: var(--radius);
}

/* Modal / summary overlay */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 2000;
  overflow-y: auto;
  padding: 20px 16px;
}
.overlay.show { display: block; }
.overlay-content {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px;
  max-width: 480px;
  margin: 0 auto;
}
.overlay-content h2 { margin-bottom: 12px; font-size: 1.2rem; }
.overlay-content .close-btn {
  float: right;
  background: var(--surface3);
  color: var(--text);
  width: 40px;
  height: 40px;
  border-radius: 50%;
  font-size: 1.2rem;
}
.summary-block {
  background: var(--surface2);
  border-radius: 8px;
  padding: 12px;
  margin: 10px 0;
  font-size: 0.9rem;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}
.summary-stat { display: inline-block; margin-right: 16px; }
.summary-stat .val { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
.summary-stat .lbl { font-size: 0.75rem; color: var(--text-dim); }
.copy-btn {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: #000;
  font-size: 1rem;
  font-weight: 700;
  border-radius: 8px;
  margin-top: 10px;
}
.copy-btn:active { opacity: 0.85; }
.copy-btn.copied { background: var(--green); }

/* History */
.history-list { list-style: none; }
.history-list li {
  padding: 14px;
  background: var(--surface2);
  border-radius: 8px;
  margin-bottom: 8px;
  cursor: pointer;
}
.history-list li:active { background: var(--surface3); }
.history-list li .h-date { font-weight: 700; }
.history-list li .h-name { color: var(--text-dim); font-size: 0.85rem; }
.history-empty { color: var(--text-dim); font-size: 0.9rem; text-align: center; padding: 20px; }

/* Exercise Picker Overlay */
.exercise-picker-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 3000;
  flex-direction: column;
}
.exercise-picker-overlay.show { display: flex; }
.exercise-picker-header {
  padding: 12px 12px 0;
  flex-shrink: 0;
}
.exercise-picker-header .picker-top-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.exercise-picker-header .picker-cancel-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--surface2);
  color: var(--text);
  font-size: 1.2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.exercise-picker-header .picker-search {
  flex: 1;
  padding: 14px 16px;
  background: var(--surface);
  border: 2px solid var(--surface3);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 1.05rem;
  outline: none;
}
.exercise-picker-header .picker-search:focus { border-color: var(--accent); }
.exercise-picker-list {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 8px 12px 40px;
}
.exercise-picker-list .picker-item {
  display: block;
  width: 100%;
  text-align: left;
  padding: 16px;
  background: var(--surface);
  color: var(--text);
  font-size: 1.05rem;
  font-weight: 500;
  border-radius: var(--radius);
  margin-bottom: 6px;
}
.exercise-picker-list .picker-item:active { background: var(--accent-dim); }
.exercise-picker-list .picker-item.custom-item {
  color: var(--accent);
  background: var(--surface2);
  border: 1px dashed var(--accent-dim);
}

/* Set column headers */
.set-header {
  display: flex;
  align-items: center;
  gap: 3px;
  padding: 4px 8px 2px;
  border-top: 1px solid var(--surface2);
}
.set-header .sh-label {
  width: 22px;
  flex-shrink: 0;
}
.set-header .sh-col {
  flex: 1;
  min-width: 0;
  text-align: center;
  font-size: 0.6rem;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.set-header .sh-done {
  width: 36px;
  flex-shrink: 0;
  margin-left: 2px;
}
.set-header .sh-remove {
  width: 24px;
  flex-shrink: 0;
  margin-left: 1px;
}

/* Gym location bar */
.gym-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: var(--surface);
  border-radius: var(--radius);
  margin: 0 12px 8px;
}
.gym-bar .gym-icon {
  font-size: 1.1rem;
  flex-shrink: 0;
}
.gym-bar .gym-name {
  flex: 1;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.gym-bar .gym-status {
  font-size: 0.75rem;
  color: var(--text-dim);
}
.gym-bar .gym-change-btn {
  padding: 6px 12px;
  background: var(--surface3);
  color: var(--accent);
  font-size: 0.75rem;
  font-weight: 600;
  border-radius: 8px;
  flex-shrink: 0;
}

/* Gym picker overlay */
.gym-picker-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 2500;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.gym-picker-overlay.show { display: flex; }
.gym-picker-box {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px;
  width: 100%;
  max-width: 360px;
  max-height: 80vh;
  overflow-y: auto;
}
.gym-picker-box h3 {
  font-size: 1rem;
  margin-bottom: 12px;
}
.gym-picker-box .gym-option {
  display: block;
  width: 100%;
  text-align: left;
  padding: 14px;
  background: var(--surface2);
  color: var(--text);
  font-size: 0.95rem;
  border-radius: 8px;
  margin-bottom: 6px;
}
.gym-picker-box .gym-option:active { background: var(--accent-dim); }
.gym-picker-box .gym-option .gym-opt-dist {
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-left: 8px;
}
.gym-picker-box .gym-new-input {
  width: 100%;
  padding: 14px;
  background: var(--surface2);
  border: 2px solid var(--surface3);
  border-radius: 8px;
  color: var(--text);
  font-size: 0.95rem;
  margin-top: 8px;
  outline: none;
}
.gym-picker-box .gym-new-input:focus { border-color: var(--accent); }
.gym-picker-box .gym-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.gym-picker-box .gym-actions button {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 600;
}
.gym-picker-box .gym-save-btn { background: var(--accent); color: #000; }
.gym-picker-box .gym-cancel-btn { background: var(--surface3); color: var(--text); }

/* Plank timer */
.plank-set {
  padding: 16px;
  border-top: 1px solid var(--surface2);
  text-align: center;
}
.plank-set.completed { background: var(--green-dim); }
.plank-set-label {
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.plank-time {
  font-size: 3.5rem;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  line-height: 1;
  margin: 8px 0;
  color: var(--text);
  cursor: pointer;
}
.plank-time.countdown { color: var(--text); }
.plank-time.warning { color: var(--orange); }
.plank-time.critical { color: var(--red); }
.plank-time.bonus { color: var(--green); }
.plank-time.result { color: var(--accent); }
.plank-action-btn {
  width: 100%;
  max-width: 200px;
  padding: 14px 0;
  border-radius: var(--radius);
  font-size: 1.1rem;
  font-weight: 700;
  margin: 8px auto 0;
  display: block;
}
.plank-action-btn.start { background: var(--green); color: #fff; }
.plank-action-btn.stop { background: var(--red); color: #fff; animation: pulse 1s infinite; }
.plank-action-btn.done { background: var(--surface3); color: var(--text-dim); }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}
.plank-result-label {
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-top: 4px;
}
.plank-remove {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: transparent;
  color: var(--red);
  font-size: 0.8rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.5;
}

/* Coach notes */
.coach-section {
  margin: 0 12px 8px;
}
.coach-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  width: 100%;
  padding: 10px 14px;
  background: var(--surface);
  border-radius: var(--radius);
  color: var(--accent);
  font-size: 0.9rem;
  font-weight: 600;
}
.coach-toggle:active { background: var(--surface2); }
.coach-body {
  display: none;
  background: var(--surface);
  border-radius: 0 0 var(--radius) var(--radius);
  padding: 0 14px 14px;
  margin-top: -4px;
}
.coach-body.show { display: block; }
.coach-body .coach-goal {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 8px;
}
.coach-body .coach-rules {
  font-size: 0.85rem;
  color: var(--text);
  line-height: 1.5;
}
.coach-body .coach-rules li {
  margin-bottom: 4px;
  list-style: none;
  padding-left: 0;
}
.coach-body .coach-rules li::before {
  margin-right: 6px;
}
.coach-body .coach-do li::before { content: "OK"; color: var(--green); font-weight: 700; font-size: 0.7rem; }
.coach-body .coach-dont li::before { content: "NO"; color: var(--red); font-weight: 700; font-size: 0.7rem; }
.coach-body .coach-next {
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px solid var(--surface2);
  font-size: 0.8rem;
  color: var(--text-dim);
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }

<script>
// ============ GYM LOCATIONS ============
const GYMS_KEY = 'knownGyms';

function getKnownGyms() {
  try { return JSON.parse(localStorage.getItem(GYMS_KEY) || '[]'); } catch(e) { return []; }
}

function saveKnownGyms(gyms) {
  localStorage.setItem(GYMS_KEY, JSON.stringify(gyms));
}

function distanceKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

let currentCoords = null;

function detectGym() {
  const el = document.getElementById('gym-name');
  if (!navigator.geolocation) {
    el.textContent = 'Tap to set gym';
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      currentCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      const gyms = getKnownGyms();
      // Find closest gym within 500m
      let closest = null;
      let closestDist = Infinity;
      gyms.forEach(g => {
        const d = distanceKm(currentCoords.lat, currentCoords.lng, g.lat, g.lng);
        if (d < closestDist) { closestDist = d; closest = g; }
      });
      if (closest && closestDist < 0.5) {
        setGym(closest.name, closest.lat, closest.lng);
      } else if (gyms.length === 0) {
        el.textContent = 'Tap to set gym';
      } else {
        el.textContent = 'New location — tap to set';
      }
    },
    err => {
      el.textContent = 'Tap to set gym';
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function setGym(name, lat, lng) {
  state.gym = { name: name, lat: lat, lng: lng };
  document.getElementById('gym-name').textContent = name;
  saveState();
}

function openGymPicker() {
  const overlay = document.getElementById('gym-picker-overlay');
  const list = document.getElementById('gym-picker-list');
  const gyms = getKnownGyms();
  let html = '';
  // Sort by distance if we have coords
  const sorted = gyms.map(g => {
    const d = currentCoords ? distanceKm(currentCoords.lat, currentCoords.lng, g.lat, g.lng) : null;
    return { ...g, dist: d };
  }).sort((a, b) => (a.dist || 999) - (b.dist || 999));

  sorted.forEach(g => {
    const distStr = g.dist !== null ? (g.dist < 1 ? Math.round(g.dist * 1000) + 'm' : g.dist.toFixed(1) + 'km') : '';
    html += '<button class="gym-option" onclick="selectGym(\'' + g.name.replace(/'/g, "\\'") + '\',' + g.lat + ',' + g.lng + ')">' +
      g.name + (distStr ? '<span class="gym-opt-dist">' + distStr + '</span>' : '') + '</button>';
  });
  if (gyms.length === 0) {
    html = '<div style="color:var(--text-dim);font-size:0.85rem;padding:8px 0">No saved gyms yet. Type a name below.</div>';
  }
  list.innerHTML = html;
  document.getElementById('gym-new-name').value = '';
  overlay.classList.add('show');
}

function closeGymPicker() {
  document.getElementById('gym-picker-overlay').classList.remove('show');
}

function selectGym(name, lat, lng) {
  setGym(name, lat, lng);
  closeGymPicker();
}

function saveNewGym() {
  const name = document.getElementById('gym-new-name').value.trim();
  if (!name) return;
  const lat = currentCoords ? currentCoords.lat : 0;
  const lng = currentCoords ? currentCoords.lng : 0;
  // Save to known gyms
  const gyms = getKnownGyms();
  // Update if same name exists, otherwise add
  const idx = gyms.findIndex(g => g.name.toLowerCase() === name.toLowerCase());
  if (idx >= 0) {
    if (lat !== 0) { gyms[idx].lat = lat; gyms[idx].lng = lng; }
  } else {
    gyms.push({ name: name, lat: lat, lng: lng });
  }
  saveKnownGyms(gyms);
  setGym(name, lat, lng);
  closeGymPicker();
}

// Active stopwatch state (not persisted — resets on refresh)
const activeStopwatches = {};

function editPlankTarget(ei, si) {
  const key = ei + '-' + si;
  if (activeStopwatches[key] && activeStopwatches[key].running) return;
  const set = state.exercises[ei].sets[si];
  if (set.done) return;
  const current = set.targetSeconds || 60;
  const input = prompt('Target seconds:', current);
  if (input === null) return;
  const val = parseInt(input);
  if (isNaN(val) || val <= 0) return;
  set.targetSeconds = val;
  set.seconds = val;
  saveState();
  renderExercises();
}

function togglePlank(ei, si) {
  const key = ei + '-' + si;
  const set = state.exercises[ei].sets[si];
  if (set.done) return;

  if (activeStopwatches[key] && activeStopwatches[key].running) {
    // STOP
    clearInterval(activeStopwatches[key].interval);
    const elapsed = Math.floor((Date.now() - activeStopwatches[key].startTime) / 1000);
    set.seconds = elapsed;
    set.done = true;
    ensureStartTime();
    activeStopwatches[key].running = false;
    saveState();
    renderExercises();
    const restSec = state.exercises[ei].restSec;
    if (restSec > 0) startRestTimer(restSec);
  } else {
    // START — countdown
    const targetSec = set.targetSeconds || 60;
    const startTime = Date.now();
    let beeped = false;
    activeStopwatches[key] = {
      startTime: startTime,
      targetSec: targetSec,
      running: true,
      interval: setInterval(() => {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const remaining = targetSec - elapsed;
        const display = document.getElementById('sw-display-' + key);
        if (!display) return;

        if (remaining > 10) {
          // Normal countdown
          const m = Math.floor(remaining / 60);
          const s = remaining % 60;
          display.textContent = m + ':' + String(s).padStart(2, '0');
          display.className = 'plank-time countdown';
        } else if (remaining > 0) {
          // Last 10 seconds — critical
          display.textContent = '0:' + String(remaining).padStart(2, '0');
          display.className = 'plank-time critical';
        } else {
          // Past target — bonus time
          if (!beeped) {
            beeped = true;
            playBeep();
            vibrateDevice();
          }
          const bonus = Math.abs(remaining);
          const bm = Math.floor(bonus / 60);
          const bs = bonus % 60;
          display.textContent = '+' + bm + ':' + String(bs).padStart(2, '0');
          display.className = 'plank-time bonus';
        }
      }, 200)
    };

    // Immediate UI update
    const display = document.getElementById('sw-display-' + key);
    if (display) {
      const m = Math.floor(targetSec / 60);
      const s = targetSec % 60;
      display.textContent = m + ':' + String(s).padStart(2, '0');
      display.className = 'plank-time countdown';
    }
    const btn = document.getElementById('sw-btn-' + key);
    if (btn) { btn.textContent = 'STOP'; btn.className = 'plank-action-btn stop'; }
  }
}

// ============ STATE ============
let state = {
  date: WORKOUT_DATE,
  name: WORKOUT_NAME,
  energy: 'normal',
  notes: '',
  startTime: null,
  gymPauseTime: null,
  homeResumeTime: null,
  exercises: [],
  finished: false
};

const STORAGE_KEY = 'workoutCurrent';
const HISTORY_KEY = 'workoutHistory';
const UNITS_KEY = 'workoutUnits';

// ============ UNIT PREFERENCES ============
const KG_TO_LBS = 2.20462;
let units = { weight: 'kg', time: 'sec' };

function loadUnits() {
  try {
    const saved = localStorage.getItem(UNITS_KEY);
    if (saved) Object.assign(units, JSON.parse(saved));
  } catch(e) {}
}

function saveUnits() {
  localStorage.setItem(UNITS_KEY, JSON.stringify(units));
}

function toggleWeightUnit() {
  units.weight = units.weight === 'kg' ? 'lbs' : 'kg';
  saveUnits();
  renderAll();
}

function toggleTimeUnit() {
  units.time = units.time === 'sec' ? 'min' : 'sec';
  saveUnits();
  renderAll();
}

function displayWeight(kg) {
  if (units.weight === 'lbs') return Math.round(kg * KG_TO_LBS * 2) / 2;
  return kg;
}

function inputToKg(val) {
  if (units.weight === 'lbs') return Math.round(val / KG_TO_LBS * 10) / 10;
  return val;
}

function weightStep() {
  return units.weight === 'lbs' ? 5 : 2.5;
}

function displayTime(sec) {
  if (units.time === 'min') return Math.round(sec / 6) / 10;
  return sec;
}

function inputToSec(val) {
  if (units.time === 'min') return Math.round(val * 60);
  return Math.round(val);
}

function timeStep() {
  return units.time === 'min' ? 0.5 : 10;
}

function weightLabel() { return units.weight; }
function timeLabel() { return units.time; }

// ============ INIT ============
function init() {
  loadUnits();
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      if (parsed.date === WORKOUT_DATE && !parsed.finished) {
        state = migrateState(parsed);
      } else {
        initFreshState();
      }
    } catch(e) { initFreshState(); }
  } else {
    initFreshState();
  }
  document.getElementById('workout-name').textContent = WORKOUT_NAME;
  document.getElementById('workout-date').textContent = WORKOUT_DATE;
  document.getElementById('build-stamp').textContent = 'build ' + BUILD_STAMP;
  renderAll();
  renderCoach();
  renderGym();
  startSessionTimer();
  updateFinishButton();
  preventPullToRefresh();
  if (!state.gym) detectGym();
}

function renderGym() {
  const el = document.getElementById('gym-name');
  if (state.gym && state.gym.name) {
    el.textContent = state.gym.name;
  }
}

function initFreshState() {
  state = {
    date: WORKOUT_DATE,
    name: WORKOUT_NAME,
    energy: 'normal',
    gym: null,
    notes: '',
    startTime: null,
    gymPauseTime: null,
    homeResumeTime: null,
    exercises: DEFAULT_EXERCISES.map(ex => ({
      name: ex.name,
      type: ex.type,
      restSec: ex.restSec,
      location: 'gym',
      sets: ex.sets.map(s => {
        if (ex.type === 'time') {
          return { targetSeconds: s.targetSeconds, seconds: s.targetSeconds, done: false };
        }
        return {
          targetWeight: s.targetWeight, targetReps: s.targetReps,
          weight: s.targetWeight, reps: s.targetReps,
          warmup: s.warmup || false, done: false
        };
      })
    })),
    finished: false
  };
}

function migrateState(s) {
  if (!s) return s;
  if (s.gymPauseTime === undefined) s.gymPauseTime = null;
  if (s.homeResumeTime === undefined) s.homeResumeTime = null;
  if (Array.isArray(s.exercises)) {
    s.exercises.forEach(ex => { if (!ex.location) ex.location = 'gym'; });
  }
  return s;
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ============ DEFER TO HOME ============
function deferToHome(ei) {
  state.exercises[ei].location = 'home';
  saveState();
  renderExercises();
  updateFinishButton();
}

function undeferExercise(ei) {
  state.exercises[ei].location = 'gym';
  saveState();
  renderExercises();
  updateFinishButton();
}

function pauseAtGym() {
  state.gymPauseTime = Date.now();
  saveState();
  renderExercises();
  updateFinishButton();
  alert('Gym session paused. Open the app at home to finish your deferred exercises.');
}

function resumeAtHome() {
  state.homeResumeTime = Date.now();
  saveState();
  renderExercises();
  updateFinishButton();
}

function hasIncompleteHomeExercise() {
  return state.exercises.some(ex =>
    ex.location === 'home' && ex.sets.filter(s => s.done).length < ex.sets.length);
}

function renderHomeBanner() {
  const slot = document.getElementById('home-banner-slot');
  if (!slot) return;
  const paused = state.gymPauseTime && !state.homeResumeTime;
  if (!paused) { slot.innerHTML = ''; return; }
  const pending = state.exercises
    .filter(ex => ex.location === 'home' && ex.sets.filter(s => s.done).length < ex.sets.length)
    .map(ex => esc(ex.name));
  if (pending.length === 0) { slot.innerHTML = ''; return; }
  slot.innerHTML =
    '<div class="home-banner">' +
      '<div class="hb-title">🏠 Gym session paused</div>' +
      '<div class="hb-list">Finish at home: ' + pending.join(', ') + '</div>' +
      '<button onclick="resumeAtHome()">I\'m home — resume</button>' +
      ' <button onclick="undoPause()" style="background:transparent;color:var(--text-dim);border:1px solid var(--surface3);">Undo pause</button>' +
    '</div>';
}

function undoPause() {
  state.gymPauseTime = null;
  state.homeResumeTime = null;
  saveState();
  renderExercises();
  updateFinishButton();
}

function updateFinishButton() {
  const btn = document.querySelector('.finish-btn');
  if (!btn) return;
  const paused = state.gymPauseTime && !state.homeResumeTime;
  const hasHome = hasIncompleteHomeExercise();
  if (hasHome && !paused) {
    btn.textContent = 'Pause at Gym';
    btn.classList.add('pause-mode');
  } else {
    btn.textContent = 'Finish Workout';
    btn.classList.remove('pause-mode');
  }
}

// ============ RENDER ============
function renderAll() {
  renderEstTime();
  renderNotes();
  renderExercises();
}

function estimateTime() {
  let totalSec = 0;
  const SET_DURATION = 30; // ~30s per weight set
  state.exercises.forEach(ex => {
    ex.sets.forEach((set, si) => {
      if (ex.type === 'time') {
        totalSec += set.seconds || set.targetSeconds || 60;
      } else {
        totalSec += SET_DURATION;
      }
      // Add rest between sets (not after last set)
      if (si < ex.sets.length - 1 && ex.restSec > 0) {
        totalSec += ex.restSec;
      }
    });
  });
  return Math.round(totalSec / 60);
}

function renderEstTime() {
  const min = estimateTime();
  const bar = document.getElementById('est-time-bar');
  bar.innerHTML = '<span class="est-label">Estimated:</span><span class="est-value">~' + min + ' min</span>';
}

function toggleNotes() {
  const area = document.getElementById('notes-area');
  area.classList.toggle('show');
  const toggle = document.getElementById('notes-toggle');
  toggle.textContent = area.classList.contains('show') ? '- Notes' : '+ Notes';
  if (area.classList.contains('show')) area.focus();
}

function renderNotes() {
  const area = document.getElementById('notes-area');
  area.value = state.notes || '';
  area.addEventListener('input', () => { state.notes = area.value; saveState(); });
}

function renderExercises() {
  renderHomeBanner();
  const container = document.getElementById('exercises-container');
  container.innerHTML = '';
  const paused = state.gymPauseTime && !state.homeResumeTime;
  state.exercises.forEach((ex, ei) => {
    const card = document.createElement('div');
    card.className = 'exercise-card';

    const completedSets = ex.sets.filter(s => s.done).length;
    const isStopwatch = STOPWATCH_EXERCISES.includes(ex.name);
    const isCycling = ex.type === 'time' && !isStopwatch;
    let badge;
    if (ex.location === 'home' && completedSets < ex.sets.length) badge = 'Home';
    else if (isCycling) badge = 'Warm-up';
    else if (completedSets === ex.sets.length && ex.sets.length > 0) badge = 'Done';
    else badge = completedSets + '/' + ex.sets.length;

    // Deferred (and not yet completed) exercises render as collapsed,
    // EXCEPT once user has resumed at home — then expand them so they can be completed.
    const isDeferredCollapsed = ex.location === 'home' &&
      completedSets < ex.sets.length &&
      !state.homeResumeTime;
    if (isDeferredCollapsed) {
      card.className += ' deferred';
      card.innerHTML = '<div class="card-header"><h2>' + esc(ex.name) + '</h2><span class="badge">' + badge + '</span></div>' +
        '<div class="deferred-msg">Deferred — finish at home' +
        '<button class="undefer-btn" onclick="undeferExercise(' + ei + ')">Move back to gym</button></div>';
      container.appendChild(card);
      return;
    }
    // Once gym session has been paused (whether currently paused or already resumed at home),
    // dim gym-location exercises so focus is on home work.
    if (state.gymPauseTime && ex.location === 'gym') {
      card.style.opacity = '0.5';
    }

    const deferBtn = (ex.location === 'gym' && completedSets < ex.sets.length && !state.gymPauseTime)
      ? '<button class="defer-btn" onclick="deferToHome(' + ei + ')" title="Do this exercise at home">🏠 Defer</button>'
      : '';

    let html = '<div class="card-header"><h2>' + esc(ex.name) + '</h2><span class="badge">' + badge + '</span>' +
      deferBtn +
      '<button class="remove-exercise-btn" onclick="removeExercise(' + ei + ')" title="Remove exercise">&times;</button></div>';

    // Column headers
    if (isStopwatch) {
      html += '<div class="set-header"><span class="sh-label"></span><span class="sh-col" style="flex:1;text-align:center">COUNTDOWN</span><span class="sh-done" style="min-width:72px"></span><span class="sh-remove"></span></div>';
    } else if (ex.type === 'time') {
      html += '<div class="set-header"><span class="sh-label"></span><span class="sh-col" onclick="toggleTimeUnit()" style="cursor:pointer">TIME (' + timeLabel() + ')</span><span class="sh-done"></span><span class="sh-remove"></span></div>';
    } else {
      html += '<div class="set-header"><span class="sh-label"></span><span class="sh-col" onclick="toggleWeightUnit()" style="cursor:pointer">' + weightLabel().toUpperCase() + '</span><span class="sh-col">REPS</span><span class="sh-done"></span><span class="sh-remove"></span></div>';
    }

    ex.sets.forEach((set, si) => {
      html += renderSetRow(ei, si, set, ex);
    });

    // Add set button
    html += '<button class="add-set-btn" onclick="addSet(' + ei + ')">+ Add Set</button>';

    card.innerHTML = html;
    container.appendChild(card);
  });
  updateFinishButton();
}

function renderSetRow(ei, si, set, ex) {
  const doneClass = set.done ? ' completed' : '';
  // Calculate display label
  let workingIdx = 0;
  let warmupIdx = 0;
  for (let i = 0; i <= si; i++) {
    if (ex.sets[i].warmup) warmupIdx++;
    else workingIdx++;
  }
  const displayLabel = set.warmup ? ('W' + warmupIdx) : (ex.type === 'time' ? '1' : '' + workingIdx);
  const labelClass = (set.warmup ? ' warmup' : '');
  if (ex.type === 'time') {
    const totalSec = set.seconds || 0;
    const isStopwatch = STOPWATCH_EXERCISES.includes(ex.name);
    if (isStopwatch) {
      const swKey = ei + '-' + si;
      const isRunning = activeStopwatches[swKey] && activeStopwatches[swKey].running;
      const targetSec = set.targetSeconds || 60;
      let displaySec, timeClass, btnClass, btnText, resultHtml = '';

      if (set.done) {
        displaySec = set.seconds || 0;
        timeClass = 'result';
        btnClass = 'done';
        btnText = 'Done';
        const diff = displaySec - targetSec;
        resultHtml = '<div class="plank-result-label">Held ' + displaySec + 's' + (diff >= 0 ? ' (+' + diff + 's bonus)' : ' (' + diff + 's)') + '</div>';
      } else if (isRunning) {
        displaySec = targetSec;
        timeClass = 'countdown';
        btnClass = 'stop';
        btnText = 'STOP';
      } else {
        displaySec = targetSec;
        timeClass = 'countdown';
        btnClass = 'start';
        btnText = 'START';
      }

      const m = Math.floor(displaySec / 60);
      const s = displaySec % 60;
      const timeStr = m + ':' + String(s).padStart(2, '0');

      return '<div class="plank-set' + (set.done ? ' completed' : '') + '" data-ei="' + ei + '" data-si="' + si + '" style="position:relative">' +
        '<div class="plank-set-label">Set ' + displayLabel + '</div>' +
        '<div class="plank-time ' + timeClass + '" id="sw-display-' + swKey + '" onclick="editPlankTarget(' + ei + ',' + si + ')">' + timeStr + '</div>' +
        '<button class="plank-action-btn ' + btnClass + '" id="sw-btn-' + swKey + '" onclick="togglePlank(' + ei + ',' + si + ')">' + btnText + '</button>' +
        resultHtml +
        '<button class="plank-remove" onclick="removeSet(' + ei + ',' + si + ')">&times;</button>' +
      '</div>';
    }
    // Regular time input (Cycling etc)
    return '<div class="set-row' + doneClass + '" data-ei="' + ei + '" data-si="' + si + '">' +
      '<span class="set-label">' + displayLabel + '</span>' +
      '<div class="seconds-input-group">' +
        '<button class="stepper-btn" onclick="stepSeconds(' + ei + ',' + si + ',-timeStep())">&minus;</button>' +
        '<input type="number" class="seconds-stepper-input" value="' + displayTime(totalSec) + '" ' +
          'onchange="setTimeFromInput(' + ei + ',' + si + ',this.value)" inputmode="decimal">' +
        '<button class="stepper-btn" onclick="stepSeconds(' + ei + ',' + si + ',timeStep())">+</button>' +
        '<span style="font-size:0.7rem;color:var(--text-dim);margin-left:4px;cursor:pointer" onclick="toggleTimeUnit()">' + timeLabel() + '</span>' +
      '</div>' +
      '<button class="done-btn' + (set.done ? ' checked' : '') + '" onclick="toggleDone(' + ei + ',' + si + ')">' +
        (set.done ? '\u2713' : '\u25CB') +
      '</button>' +
      '<button class="remove-set-btn" onclick="removeSet(' + ei + ',' + si + ')">&times;</button>' +
    '</div>';
  }

  return '<div class="set-row' + doneClass + '" data-ei="' + ei + '" data-si="' + si + '">' +
    '<span class="set-label' + labelClass + '">' + displayLabel + '</span>' +
    '<div class="input-group">' +
      '<button class="stepper-btn" onclick="stepVal(' + ei + ',' + si + ',\'weight\',-weightStep())">&minus;</button>' +
      '<input type="number" class="stepper-input" value="' + displayWeight(set.weight) + '" step="' + weightStep() + '" ' +
        'onchange="setWeightFromInput(' + ei + ',' + si + ',this.value)" inputmode="decimal">' +
      '<button class="stepper-btn" onclick="stepVal(' + ei + ',' + si + ',\'weight\',weightStep())">+</button>' +
      '<span class="unit-label" onclick="toggleWeightUnit()" style="cursor:pointer">' + weightLabel() + '</span>' +
    '</div>' +
    '<div class="input-group">' +
      '<button class="stepper-btn" onclick="stepVal(' + ei + ',' + si + ',\'reps\',-1)">&minus;</button>' +
      '<input type="number" class="stepper-input" value="' + set.reps + '" step="1" ' +
        'onchange="setVal(' + ei + ',' + si + ',\'reps\',this.value)" inputmode="numeric">' +
      '<button class="stepper-btn" onclick="stepVal(' + ei + ',' + si + ',\'reps\',1)">+</button>' +
      '<span class="unit-label">reps</span>' +
    '</div>' +
    '<button class="done-btn' + (set.done ? ' checked' : '') + '" onclick="toggleDone(' + ei + ',' + si + ')">' +
      (set.done ? '\u2713' : '\u25CB') +
    '</button>' +
    '<button class="remove-set-btn" onclick="removeSet(' + ei + ',' + si + ')">&times;</button>' +
  '</div>';
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ============ SET ACTIONS ============
function setVal(ei, si, field, val) {
  const num = parseFloat(val);
  if (!isNaN(num) && num >= 0) {
    state.exercises[ei].sets[si][field] = num;
    saveState();
  }
}

function setWeightFromInput(ei, si, val) {
  const num = parseFloat(val);
  if (!isNaN(num) && num >= 0) {
    state.exercises[ei].sets[si].weight = inputToKg(num);
    saveState();
  }
}

function stepVal(ei, si, field, delta) {
  const set = state.exercises[ei].sets[si];
  let newVal;
  if (field === 'weight') {
    const deltaKg = units.weight === 'lbs' ? delta / KG_TO_LBS : delta;
    newVal = Math.max(0, (set.weight || 0) + deltaKg);
    set.weight = Math.round(newVal * 10) / 10;
  } else {
    newVal = Math.max(0, (set[field] || 0) + delta);
    set[field] = Math.round(newVal * 10) / 10;
  }
  // Apply to subsequent unfinished sets
  const sets = state.exercises[ei].sets;
  let applied = 0;
  for (let i = si + 1; i < sets.length; i++) {
    if (!sets[i].done && !sets[i].warmup) {
      if (field === 'weight') sets[i].weight = set.weight;
      else sets[i][field] = set[field];
      applied++;
    }
  }
  saveState();
  if (applied > 0) {
    renderExercises();
  } else {
    const rows = document.querySelectorAll('.set-row[data-ei="' + ei + '"][data-si="' + si + '"]');
    if (rows.length) {
      const inputs = rows[0].querySelectorAll('.stepper-input');
      if (field === 'weight' && inputs[0]) inputs[0].value = displayWeight(set.weight);
      if (field === 'reps' && inputs[1]) inputs[1].value = set.reps;
    }
  }
}

function setTimeFromInput(ei, si, val) {
  const num = parseFloat(val) || 0;
  state.exercises[ei].sets[si].seconds = Math.max(0, inputToSec(num));
  saveState();
}

function setSeconds(ei, si, val) {
  const num = parseInt(val) || 0;
  state.exercises[ei].sets[si].seconds = Math.max(0, num);
  saveState();
}

function stepSeconds(ei, si, delta) {
  const set = state.exercises[ei].sets[si];
  const deltaSec = units.time === 'min' ? delta * 60 : delta;
  set.seconds = Math.max(0, (set.seconds || 0) + deltaSec);
  saveState();
  const rows = document.querySelectorAll('.set-row[data-ei="' + ei + '"][data-si="' + si + '"]');
  if (rows.length) {
    const input = rows[0].querySelector('.seconds-stepper-input');
    if (input) input.value = displayTime(set.seconds);
  }
}

function updateTime(ei, si, part, val) {
  const set = state.exercises[ei].sets[si];
  const total = set.seconds || 0;
  const mins = Math.floor(total / 60);
  const secs = total % 60;
  const v = parseInt(val) || 0;
  if (part === 'min') set.seconds = v * 60 + secs;
  else set.seconds = mins * 60 + Math.min(59, v);
  saveState();
}

function toggleDone(ei, si) {
  const set = state.exercises[ei].sets[si];
  set.done = !set.done;
  if (set.done) ensureStartTime();
  saveState();
  renderExercises();
  if (set.done) {
    const restSec = state.exercises[ei].restSec;
    if (restSec > 0) startRestTimer(restSec);
  }
}

// ============ ADD/REMOVE SETS ============
function addSet(ei) {
  const ex = state.exercises[ei];
  const lastSet = ex.sets[ex.sets.length - 1];
  let newSet;
  if (ex.type === 'time') {
    newSet = {
      targetSeconds: lastSet.targetSeconds || lastSet.seconds || 60,
      seconds: lastSet.seconds || lastSet.targetSeconds || 60,
      done: false
    };
  } else {
    newSet = {
      targetWeight: lastSet.targetWeight || lastSet.weight || 0,
      targetReps: lastSet.targetReps || lastSet.reps || 10,
      weight: lastSet.weight || lastSet.targetWeight || 0,
      reps: lastSet.reps || lastSet.targetReps || 10,
      warmup: false,
      done: false
    };
  }
  ex.sets.push(newSet);
  saveState();
  renderExercises();
}

function removeSet(ei, si) {
  const ex = state.exercises[ei];
  if (ex.sets.length <= 1) {
    removeExercise(ei);
    return;
  }
  ex.sets.splice(si, 1);
  saveState();
  renderExercises();
}

function removeExercise(ei) {
  const name = state.exercises[ei].name;
  if (!confirm('Remove ' + name + '?')) return;
  state.exercises.splice(ei, 1);
  saveState();
  renderExercises();
}

// ============ EXERCISE PICKER ============
function openExercisePicker() {
  const overlay = document.getElementById('exercise-picker-overlay');
  overlay.classList.add('show');
  const search = document.getElementById('picker-search');
  search.value = '';
  renderPickerList('');
  // Focus after a small delay so the overlay is visible
  setTimeout(() => search.focus(), 100);
}

function closeExercisePicker() {
  document.getElementById('exercise-picker-overlay').classList.remove('show');
  document.getElementById('picker-search').value = '';
}

function renderPickerList(query) {
  const list = document.getElementById('picker-list');
  const q = query.trim().toLowerCase();
  let html = '';

  const filtered = q === '' ? EXERCISE_LIST : EXERCISE_LIST.filter(name => name.toLowerCase().includes(q));

  filtered.forEach(name => {
    html += '<button class="picker-item" onclick="selectExercise(\'' + esc(name).replace(/'/g, "\\'") + '\')">' + esc(name) + '</button>';
  });

  // Show custom option if query doesn't exactly match any exercise
  if (q !== '' && !EXERCISE_LIST.some(name => name.toLowerCase() === q)) {
    const displayName = query.trim();
    html += '<button class="picker-item custom-item" onclick="selectExercise(\'' + esc(displayName).replace(/'/g, "\\'") + '\')">Add "' + esc(displayName) + '" as custom</button>';
  }

  if (filtered.length === 0 && q === '') {
    html = '<div style="text-align:center;color:var(--text-dim);padding:20px">No exercises found</div>';
  }

  list.innerHTML = html;
}

// Attach search input event
document.getElementById('picker-search').addEventListener('input', function() {
  renderPickerList(this.value);
});

function selectExercise(name) {
  const type = isTimeBased(name) ? 'time' : 'weight';
  const restSec = type === 'time' ? 0 : 60;
  let sets;
  if (type === 'time') {
    sets = [
      { targetSeconds: 60, seconds: 60, done: false }
    ];
  } else {
    sets = [
      { targetWeight: 0, targetReps: 10, weight: 0, reps: 10, warmup: false, done: false },
      { targetWeight: 0, targetReps: 10, weight: 0, reps: 10, warmup: false, done: false },
      { targetWeight: 0, targetReps: 10, weight: 0, reps: 10, warmup: false, done: false }
    ];
  }
  state.exercises.push({
    name: name,
    type: type,
    restSec: restSec,
    sets: sets
  });
  saveState();
  renderExercises();
  closeExercisePicker();
  // Scroll to new exercise
  setTimeout(() => {
    const container = document.getElementById('exercises-container');
    if (container.lastElementChild) {
      container.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 100);
}

// ============ REST TIMER ============
let restInterval = null;
let restRemaining = 0;
let audioCtx = null;

function startRestTimer(seconds) {
  clearRestTimer();
  restRemaining = seconds;
  const bar = document.getElementById('rest-timer-bar');
  const header = document.getElementById('header');
  bar.style.display = 'block';
  bar.classList.remove('urgent');
  header.classList.add('timer-active');
  updateTimerDisplay();
  restInterval = setInterval(() => {
    restRemaining--;
    if (restRemaining <= 10 && restRemaining > 0) bar.classList.add('urgent');
    if (restRemaining <= 0) {
      timerDone();
      return;
    }
    updateTimerDisplay();
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(restRemaining / 60);
  const s = restRemaining % 60;
  document.getElementById('rest-timer-display').textContent = m + ':' + String(s).padStart(2, '0');
}

function timerDone() {
  clearRestTimer();
  playBeep();
  vibrateDevice();
  const bar = document.getElementById('rest-timer-bar');
  bar.classList.add('urgent');
  document.getElementById('rest-timer-display').textContent = 'GO!';
  setTimeout(() => {
    bar.style.display = 'none';
    bar.classList.remove('urgent');
    document.getElementById('header').classList.remove('timer-active');
  }, 2000);
}

function dismissTimer() {
  clearRestTimer();
  const bar = document.getElementById('rest-timer-bar');
  bar.style.display = 'none';
  bar.classList.remove('urgent');
  document.getElementById('header').classList.remove('timer-active');
}

function clearRestTimer() {
  if (restInterval) { clearInterval(restInterval); restInterval = null; }
}

function playBeep() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.2, 0.4].forEach(delay => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 880;
      osc.type = 'square';
      gain.gain.value = 0.3;
      osc.start(audioCtx.currentTime + delay);
      osc.stop(audioCtx.currentTime + delay + 0.12);
    });
  } catch(e) {}
}

function vibrateDevice() {
  try { if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]); } catch(e) {}
}

// ============ SESSION TIMER ============
let sessionInterval = null;
function activeElapsedSec() {
  if (!state.startTime) return 0;
  const paused = state.gymPauseTime && !state.homeResumeTime;
  if (paused) {
    return Math.floor((state.gymPauseTime - state.startTime) / 1000);
  }
  if (state.gymPauseTime && state.homeResumeTime) {
    const gymPart = state.gymPauseTime - state.startTime;
    const homePart = Date.now() - state.homeResumeTime;
    return Math.floor((gymPart + homePart) / 1000);
  }
  return Math.floor((Date.now() - state.startTime) / 1000);
}

function startSessionTimer() {
  const el = document.getElementById('session-time');
  function update() {
    if (!state.startTime) {
      el.textContent = '0:00';
      return;
    }
    const elapsed = activeElapsedSec();
    const h = Math.floor(elapsed / 3600);
    const m = Math.floor((elapsed % 3600) / 60);
    const s = elapsed % 60;
    const txt = (h > 0 ? h + ':' : '') + (h > 0 ? String(m).padStart(2,'0') : m) + ':' + String(s).padStart(2, '0');
    const paused = state.gymPauseTime && !state.homeResumeTime;
    el.textContent = paused ? (txt + ' (paused)') : txt;
  }
  update();
  sessionInterval = setInterval(update, 1000);
}

function ensureStartTime() {
  if (!state.startTime) {
    state.startTime = Date.now();
    saveState();
  }
}

// ============ FINISH WORKOUT ============
function resetWorkout() {
  if (!confirm('Reset workout? All progress will be cleared.')) return;
  localStorage.removeItem(STORAGE_KEY);
  initFreshState();
  saveState();
  renderAll();
}

function finishWorkout() {
  // If there's an incomplete deferred (home) exercise and we haven't paused yet,
  // this button means "Pause at Gym" instead of "Finish".
  const pausedAlready = state.gymPauseTime && !state.homeResumeTime;
  if (hasIncompleteHomeExercise() && !pausedAlready) {
    if (!confirm('Pause the gym session and finish ' +
        state.exercises.filter(ex => ex.location === 'home' && ex.sets.filter(s => s.done).length < ex.sets.length).length +
        ' deferred exercise(s) at home?')) return;
    pauseAtGym();
    return;
  }

  const completedSets = state.exercises.reduce((a, ex) => a + ex.sets.filter(s => s.done).length, 0);
  if (completedSets === 0) {
    if (!confirm('No sets completed. Finish anyway?')) return;
  }
  if (!confirm('Finish this workout?')) return;

  const elapsed = activeElapsedSec();
  const durationMin = Math.round(elapsed / 60);

  const exportData = buildExportJSON(durationMin);
  const summary = buildSummary(durationMin);

  const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  history.push({ ...exportData, _summary: summary, _timestamp: Date.now() });
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));

  state.finished = true;
  saveState();

  showSummaryOverlay(exportData, summary, durationMin);
}

function buildExportJSON(durationMin) {
  const exercises = [];
  state.exercises.forEach(ex => {
    const doneSets = ex.sets.filter(s => s.done);
    if (doneSets.length === 0) return;
    const exData = { name: ex.name, sets: [] };
    doneSets.forEach(s => {
      if (ex.type === 'time') {
        exData.sets.push({ seconds: s.seconds || 0 });
      } else {
        exData.sets.push({ weight: s.weight, reps: s.reps });
      }
    });
    exercises.push(exData);
  });
  return {
    date: state.date,
    name: state.name,
    duration_min: durationMin,
    exercises: exercises,
    gym: state.gym || null,
    energy: state.energy,
    notes: state.notes || ''
  };
}

function buildSummary(durationMin) {
  let lines = [];
  lines.push(state.name + ' - ' + state.date);
  if (state.gym && state.gym.name) lines.push('Gym: ' + state.gym.name);
  lines.push('Duration: ' + durationMin + ' min | Energy: ' + state.energy);
  lines.push('');
  let totalVolume = 0;
  let totalSets = 0;
  state.exercises.forEach(ex => {
    const doneSets = ex.sets.filter(s => s.done);
    if (doneSets.length === 0) return;
    lines.push(ex.name + ':');
    doneSets.forEach(s => {
      if (ex.type === 'time') {
        const m = Math.floor(s.seconds / 60);
        const sec = s.seconds % 60;
        lines.push('  ' + m + ':' + String(sec).padStart(2, '0'));
      } else {
        lines.push('  ' + displayWeight(s.weight) + weightLabel() + ' x ' + s.reps);
        totalVolume += s.weight * s.reps;
      }
      totalSets++;
    });
  });
  lines.push('');
  const volDisplay = units.weight === 'lbs' ? Math.round(totalVolume * KG_TO_LBS) : Math.round(totalVolume);
  lines.push('Total sets: ' + totalSets + ' | Volume: ' + volDisplay + ' ' + weightLabel());
  if (state.notes) lines.push('Notes: ' + state.notes);
  return lines.join('\n');
}

function showSummaryOverlay(exportData, summary, durationMin) {
  const totalVolume = exportData.exercises.reduce((a, ex) =>
    a + ex.sets.reduce((b, s) => b + ((s.weight || 0) * (s.reps || 0)), 0), 0);
  const totalSets = exportData.exercises.reduce((a, ex) => a + ex.sets.length, 0);

  const el = document.getElementById('summary-content');
  el.innerHTML =
    '<button class="close-btn" onclick="closeSummary()">&times;</button>' +
    '<h2>Workout Complete</h2>' +
    '<div style="margin:12px 0">' +
      '<span class="summary-stat"><span class="val">' + durationMin + '</span><br><span class="lbl">minutes</span></span>' +
      '<span class="summary-stat"><span class="val">' + totalSets + '</span><br><span class="lbl">sets</span></span>' +
      '<span class="summary-stat"><span class="val">' + (units.weight === 'lbs' ? Math.round(totalVolume * KG_TO_LBS) : Math.round(totalVolume)) + '</span><br><span class="lbl">' + weightLabel() + ' volume</span></span>' +
    '</div>' +
    '<div class="summary-block" id="summary-text">' + esc(summary) + '</div>' +
    '<button class="copy-btn" id="copy-summary-btn" onclick="copySummary()">Copy Summary Text</button>' +
    '<button class="copy-btn" id="copy-json-btn" onclick="copyJSON()" style="margin-top:6px;background:var(--surface3);color:var(--text)">Copy as JSON</button>';
  el.dataset.json = JSON.stringify(exportData);
  el.dataset.summary = summary;
  document.getElementById('summary-overlay').classList.add('show');
}

function closeSummary() {
  document.getElementById('summary-overlay').classList.remove('show');
}

async function copySummary() {
  const text = document.getElementById('summary-content').dataset.summary;
  await copyToClipboard(text);
  const btn = document.getElementById('copy-summary-btn');
  btn.textContent = 'Copied!';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'Copy Summary Text'; btn.classList.remove('copied'); }, 2000);
}

async function copyJSON() {
  const text = document.getElementById('summary-content').dataset.json;
  await copyToClipboard(text);
  const btn = document.getElementById('copy-json-btn');
  btn.textContent = 'Copied!';
  btn.style.background = 'var(--green)';
  btn.style.color = '#000';
  setTimeout(() => { btn.textContent = 'Copy as JSON'; btn.style.background = ''; btn.style.color = ''; }, 2000);
}

async function copyToClipboard(text) {
  try {
    await navigator.clipboard.writeText(text);
  } catch(e) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
}

// ============ HISTORY ============
function showHistory() {
  const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  const el = document.getElementById('history-content');
  let html = '<button class="close-btn" onclick="closeHistory()">&times;</button><h2>Workout History</h2>';
  if (history.length === 0) {
    html += '<div class="history-empty">No past workouts yet.</div>';
  } else {
    html += '<ul class="history-list">';
    [...history].reverse().forEach((w, i) => {
      const idx = history.length - 1 - i;
      const sets = (w.exercises || []).reduce((a, ex) => a + ex.sets.length, 0);
      html += '<li onclick="showHistoryItem(' + idx + ')">' +
        '<span class="h-date">' + esc(w.date) + '</span>' +
        '<span class="h-name">' + esc(w.name) + ' &mdash; ' + sets + ' sets, ' + (w.duration_min || 0) + 'min</span>' +
      '</li>';
    });
    html += '</ul>';
  }
  el.innerHTML = html;
  document.getElementById('history-overlay').classList.add('show');
}

function closeHistory() {
  document.getElementById('history-overlay').classList.remove('show');
}

function showHistoryItem(idx) {
  const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  const w = history[idx];
  if (!w) return;
  const summary = w._summary || JSON.stringify(w, null, 2);
  const el = document.getElementById('history-content');
  el.innerHTML =
    '<button class="close-btn" onclick="showHistory()">&larr;</button>' +
    '<h2>' + esc(w.name) + '</h2>' +
    '<div style="color:var(--text-dim);font-size:0.85rem;margin-bottom:8px">' + esc(w.date) + ' &mdash; ' + (w.duration_min || 0) + ' min</div>' +
    '<div class="summary-block">' + esc(summary) + '</div>' +
    '<button class="copy-btn" onclick="copyHistoryJSON(' + idx + ')">Copy as JSON</button>' +
    '<button class="copy-btn" onclick="deleteHistoryItem(' + idx + ')" style="margin-top:6px;background:var(--red);color:#fff">Delete</button>';
}

function deleteHistoryItem(idx) {
  if (!confirm('Delete this workout from history?')) return;
  const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  history.splice(idx, 1);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  showHistory();
}

async function copyHistoryJSON(idx) {
  const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  const w = { ...history[idx] };
  delete w._summary;
  delete w._timestamp;
  await copyToClipboard(JSON.stringify(w));
}

// ============ PREVENT PULL-TO-REFRESH ============
function preventPullToRefresh() {
  let startY = 0;
  document.addEventListener('touchstart', e => {
    startY = e.touches[0].pageY;
  }, { passive: true });
  document.addEventListener('touchmove', e => {
    const y = e.touches[0].pageY;
    if (window.scrollY === 0 && y > startY + 10) {
      document.getElementById('pull-hint').style.opacity = '1';
    }
  }, { passive: true });
  document.addEventListener('touchend', () => {
    document.getElementById('pull-hint').style.opacity = '0';
  }, { passive: true });
}

// ============ BOOT ============
init();
</script>
